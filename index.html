<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>訓練追蹤</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 680 680'%3E%3Crect x='140' y='140' width='400' height='400' rx='100' fill='%23f4f4ef'/%3E%3Cellipse cx='340' cy='450' rx='72' ry='78' fill='%23ffcba4'/%3E%3Crect x='320' y='360' width='40' height='36' rx='12' fill='%23ffcba4'/%3E%3Cellipse cx='340' cy='318' rx='80' ry='82' fill='%23ffcba4'/%3E%3Cellipse cx='232' cy='368' rx='28' ry='56' fill='%23ffcba4' transform='rotate(-38,232,368)'/%3E%3Cellipse cx='196' cy='308' rx='28' ry='28' fill='%23ffcba4'/%3E%3Cellipse cx='224' cy='340' rx='24' ry='18' fill='%23f5a87a'/%3E%3Cellipse cx='448' cy='368' rx='28' ry='56' fill='%23ffcba4' transform='rotate(38,448,368)'/%3E%3Cellipse cx='484' cy='308' rx='28' ry='28' fill='%23ffcba4'/%3E%3Cellipse cx='456' cy='340' rx='24' ry='18' fill='%23f5a87a'/%3E%3Cpath d='M308 306 Q320 296 332 306' fill='none' stroke='%231a1a1a' stroke-width='5' stroke-linecap='round'/%3E%3Cpath d='M348 306 Q360 296 372 306' fill='none' stroke='%231a1a1a' stroke-width='5' stroke-linecap='round'/%3E%3Cpath d='M308 338 Q340 368 372 338' fill='none' stroke='%231a1a1a' stroke-width='5' stroke-linecap='round'/%3E%3Cellipse cx='292' cy='332' rx='18' ry='12' fill='%23f5a87a' opacity='.55'/%3E%3Cellipse cx='388' cy='332' rx='18' ry='12' fill='%23f5a87a' opacity='.55'/%3E%3Cpath d='M378 272 Q383 260 388 272 Q388 283 383 285 Q378 283 378 272Z' fill='%23a8d8ea'/%3E%3Cpath d='M182 262 L186 274 L198 274 L189 282 L192 294 L182 286 L172 294 L175 282 L166 274 L178 274Z' fill='%23f5c842'/%3E%3Cpath d='M498 262 L502 274 L514 274 L505 282 L508 294 L498 286 L488 294 L491 282 L482 274 L494 274Z' fill='%23f5c842'/%3E%3C/svg%3E">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4ef; color: #1a1a1a; min-height: 100vh; padding: 1.5rem 1rem; }
.app { max-width: 640px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.5rem; }
.header h1 { font-size: 20px; font-weight: 500; }
.header span { font-size: 12px; color: #999; }
.card { background: #fff; border: 0.5px solid #e4e4dc; border-radius: 14px; padding: 1rem 1.125rem; margin-bottom: 1rem; }
.label { font-size: 11px; font-weight: 500; color: #aaa; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 0.75rem; }
.muscle-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 1rem; }
.muscle-card { background: #fff; border: 0.5px solid #e4e4dc; border-radius: 12px; padding: 0.75rem 0.625rem; }
.muscle-name { font-size: 14px; font-weight: 500; margin-bottom: 3px; }
.muscle-status { font-size: 11px; display: flex; align-items: center; gap: 4px; }
.status-ready { color: #0f6e56; }
.status-resting { color: #a32d2d; }
.status-soon { color: #854f0b; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.dot-ready { background: #1d9e75; }
.dot-resting { background: #e24b4a; }
.dot-soon { background: #ef9f27; }
.bar-wrap { margin-top: 6px; background: #eee; border-radius: 3px; height: 3px; }
.bar { height: 3px; border-radius: 3px; transition: width 0.3s; }
.tag-row { display: flex; gap: 6px; flex-wrap: wrap; }
.tag { font-size: 12px; padding: 3px 10px; border-radius: 6px; font-weight: 500; }
.tag-ready { background: #e1f5ee; color: #0f6e56; }
.tag-warn { background: #faeeda; color: #854f0b; }
.tag-avoid { background: #fcebeb; color: #a32d2d; }
.row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
.row-label { font-size: 12px; color: #aaa; min-width: 36px; }
.btn { height: 34px; padding: 0 12px; font-size: 13px; border-radius: 8px; border: 0.5px solid #ddd; background: #fff; color: #555; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #f4f4ef; }
.btn.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }
.btn.active-light { background: #e1f5ee; border-color: #1d9e75; color: #0f6e56; font-weight: 500; }
.btn.active-moderate { background: #faeeda; border-color: #ef9f27; color: #854f0b; font-weight: 500; }
.btn.active-maximum { background: #fcebeb; border-color: #e24b4a; color: #a32d2d; font-weight: 500; }
.btn.checked { background: #e6f1fb; border-color: #378add; color: #185fa5; font-weight: 500; }
.btn.primary { background: #378add; border-color: #378add; color: #fff; }
.btn.primary:hover { background: #185fa5; }
.hist-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-top: 0.5px solid #efefea; font-size: 13px; }
.hist-item:first-child { border-top: none; }
.hist-left { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.hist-name { font-weight: 500; }
.hist-meta { font-size: 11px; color: #bbb; }
.badge { font-size: 11px; padding: 2px 7px; border-radius: 5px; }
.badge-light { background: #e1f5ee; color: #0f6e56; }
.badge-moderate { background: #faeeda; color: #854f0b; }
.badge-maximum { background: #fcebeb; color: #a32d2d; }
.badge-spin { background: #e6f1fb; color: #185fa5; }
.del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 13px; padding: 0 2px; flex-shrink: 0; }
.del-btn:hover { color: #e24b4a; }
.empty { font-size: 12px; color: #ccc; }
.protein-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.protein-num { font-size: 28px; font-weight: 500; }
.protein-num span { font-size: 14px; color: #aaa; font-weight: 400; }
.protein-goal { font-size: 12px; color: #aaa; }
.pbar-wrap { background: #eee; border-radius: 5px; height: 6px; margin-bottom: 1rem; }
.pbar { height: 6px; border-radius: 5px; background: #1d9e75; transition: width 0.3s; }
.pbar.over { background: #378add; }
.pinput-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.pinput-row input { height: 34px; border-radius: 8px; border: 0.5px solid #ddd; background: #f4f4ef; color: #1a1a1a; padding: 0 10px; font-size: 13px; }
#inp-protein { width: 110px; flex-shrink: 0; }
#inp-protein-note { flex: 1; min-width: 0; max-width: 130px; }
.week-divider { border-top: 0.5px solid #efefea; margin-top: 0.875rem; padding-top: 0.875rem; }
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 0.5rem; }
.day-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.day-bar-wrap { width: 100%; height: 50px; background: #eee; border-radius: 3px; display: flex; align-items: flex-end; overflow: hidden; }
.day-bar { width: 100%; transition: height 0.3s; }
.day-date { font-size: 9px; }
.day-name { font-size: 9px; }
.day-val { font-size: 9px; font-weight: 500; color: #888; }
@media (max-width: 480px) {
  .muscle-grid { grid-template-columns: repeat(3, 1fr); }
  .pinput-row { flex-direction: column; align-items: stretch; }
  #inp-protein, #inp-protein-note { max-width: 100%; width: 100%; }
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>訓練追蹤</h1>
    <span id="today-label"></span>
  </div>

  <p class="label">肌群狀態</p>
  <div class="muscle-grid" id="muscle-grid"></div>

  <div class="card">
    <p class="label">明天建議</p>
    <div class="tag-row" id="tomorrow-list"></div>
  </div>

  <div class="card">
    <p class="label">記錄訓練</p>
    <div class="row">
      <button class="btn active" id="btn-strength" onclick="setType('strength')">重訓</button>
      <button class="btn" id="btn-spin" onclick="setType('spin')">飛輪</button>
    </div>
    <div id="strength-options">
      <div class="row">
        <span class="row-label">部位</span>
        <button class="btn" onclick="toggleMuscle(this,'胸')">胸</button>
        <button class="btn" onclick="toggleMuscle(this,'背')">背</button>
        <button class="btn" onclick="toggleMuscle(this,'腹部')">腹部</button>
        <button class="btn" onclick="toggleMuscle(this,'大腿')">大腿</button>
        <button class="btn" onclick="toggleMuscle(this,'屁股')">屁股</button>
      </div>
      <div class="row">
        <span class="row-label">強度</span>
        <button class="btn" id="int-light" onclick="setIntensity('light')">1 light</button>
        <button class="btn" id="int-moderate" onclick="setIntensity('moderate')">2 moderate</button>
        <button class="btn" id="int-maximum" onclick="setIntensity('maximum')">3 maximum</button>
      </div>
    </div>
    <div id="spin-note" style="display:none;font-size:12px;color:#aaa;margin-bottom:8px;">飛輪自動記錄：大腿 +1、屁股 +1</div>
    <div class="row" style="margin-top:2px;">
      <button class="btn primary" onclick="addLog()">記錄 +</button>
    </div>
    <div id="log-history"></div>
  </div>

  <div class="card">
    <p class="label">每日蛋白質</p>
    <div class="protein-top">
      <div class="protein-num"><span id="protein-today-val">0</span><span>g</span></div>
      <div class="protein-goal">目標 100g</div>
    </div>
    <div class="pbar-wrap"><div class="pbar" id="protein-bar" style="width:0%"></div></div>
    <div class="pinput-row">
      <input type="number" id="inp-protein" placeholder="這餐幾克？" min="0" max="300" />
      <input type="text" id="inp-protein-note" placeholder="備註（選填）" />
      <button class="btn primary" onclick="addProtein()">新增 +</button>
    </div>
    <div id="protein-meals"></div>
    <div class="week-divider">
      <p class="label" style="margin-bottom:0.5rem;">本週紀錄</p>
      <div class="week-grid" id="protein-week-grid"></div>
    </div>
  </div>

</div>
<script>
const MUSCLES = ['胸','背','腹部','大腿','屁股'];
const DECAY = 1.5;
const DN = ['日','一','二','三','四','五','六'];
let selType = 'strength', selInt = null, selMus = new Set();

function getLogs() { try { return JSON.parse(localStorage.getItem('ml2')||'[]'); } catch { return []; } }
function saveLogs(d) { localStorage.setItem('ml2', JSON.stringify(d)); }
function getProLogs() { try { return JSON.parse(localStorage.getItem('pm')||'[]'); } catch { return []; } }
function saveProLogs(d) { localStorage.setItem('pm', JSON.stringify(d)); }
function todayKey() { return new Date().toISOString().split('T')[0]; }
function nowTs() { return new Date().toISOString(); }
function daysSince(ts) { return (Date.now() - new Date(ts).getTime()) / 86400000; }

function getRawScore(name, extra) {
  extra = extra || 0;
  let s = 0;
  getLogs().filter(l => l.muscles && l.muscles.includes(name)).forEach(l => {
    const r = l.score - (daysSince(l.date) + extra) * DECAY;
    if (r > 0) s += r;
  });
  return Math.max(0, s);
}

function getScore(name, extra) {
  return Math.min(3, getRawScore(name, extra || 0));
}

function formatDays(d) {
  if (d <= 0) return '0';
  const totalHours = Math.round(d * 24);
  const days = Math.floor(totalHours / 24);
  const hours = totalHours % 24;
  if (days === 0) return `${hours} 小時`;
  if (hours === 0) return `${days} 天`;
  return `${days} 天 ${hours} 小時`;
}

function renderMuscles() {
  document.getElementById('muscle-grid').innerHTML = MUSCLES.map(name => {
    const s = getScore(name);
    const raw = getRawScore(name);
    const pct = Math.round(s / 3 * 100);
    const bc = s >= 2.5 ? '#e24b4a' : s >= 1.5 ? '#ef9f27' : '#1d9e75';
    const dc = s <= 0 ? 'dot-ready' : s >= 3 ? 'dot-resting' : 'dot-soon';
    const sc = s <= 0 ? 'status-ready' : s >= 3 ? 'status-resting' : 'status-soon';
    const daysLeft = raw / DECAY;
    const lbl = s <= 0 ? '可以訓練' : s >= 3 ? `休息中（還需 ${formatDays(daysLeft)}）` : `還需 ${formatDays(daysLeft)}`;
    return `<div class="muscle-card"><div class="muscle-name">${name}</div><div class="muscle-status ${sc}"><span class="dot ${dc}"></span>${lbl}</div><div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${bc}"></div></div></div>`;
  }).join('');
}

function renderTomorrow() {
  const el = document.getElementById('tomorrow-list');
  const ready = [], warn = [], avoid = [];
  MUSCLES.forEach(name => {
    const todayS = getScore(name);
    const tmrS = getScore(name, 1);
    if (todayS >= 3) avoid.push(name);
    else if (todayS > 0 && tmrS <= 0) warn.push(name);
    else if (tmrS <= 0) ready.push(name);
    else warn.push(name);
  });
  el.innerHTML = !ready.length && !warn.length && !avoid.length
    ? '<span class="empty">記錄訓練後顯示建議</span>'
    : ready.map(n=>`<span class="tag tag-ready">✓ ${n}</span>`).join('')
    + warn.map(n=>`<span class="tag tag-warn">△! ${n}</span>`).join('')
    + avoid.map(n=>`<span class="tag tag-avoid">✕ ${n}</span>`).join('');
}

function renderHistory() {
  const logs = getLogs();
  const el = document.getElementById('log-history');
  if (!logs.length) { el.innerHTML = '<p class="empty" style="margin-top:4px;">還沒有記錄</p>'; return; }
  const iL = {light:'1 light',moderate:'2 moderate',maximum:'3 maximum'};
  const bC = {light:'badge-light',moderate:'badge-moderate',maximum:'badge-maximum'};
  el.innerHTML = [...logs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,10).map(l => {
    const badge = l.type==='spin' ? `<span class="badge badge-spin">飛輪</span>` : `<span class="badge ${bC[l.intensity]}">${iL[l.intensity]}</span>`;
    return `<div class="hist-item"><div class="hist-left"><span class="hist-name">${(l.muscles||[]).join('、')}</span>${badge}<span class="hist-meta">${l.date.split('T')[0]}</span></div><button class="del-btn" onclick="deleteLog('${l.id}')">✕</button></div>`;
  }).join('');
}

function setType(t) {
  selType = t;
  document.getElementById('btn-strength').className = 'btn'+(t==='strength'?' active':'');
  document.getElementById('btn-spin').className = 'btn'+(t==='spin'?' active':'');
  document.getElementById('strength-options').style.display = t==='strength' ? '' : 'none';
  document.getElementById('spin-note').style.display = t==='spin' ? '' : 'none';
}
function setIntensity(lv) {
  selInt = lv;
  ['light','moderate','maximum'].forEach(l => { document.getElementById('int-'+l).className = 'btn'+(l===lv?' active-'+l:''); });
}
function toggleMuscle(btn, name) {
  selMus.has(name) ? (selMus.delete(name), btn.classList.remove('checked')) : (selMus.add(name), btn.classList.add('checked'));
}
function addLog() {
  const logs = getLogs();
  if (selType==='spin') {
    logs.push({id:Date.now().toString(),type:'spin',muscles:['大腿','屁股'],score:1,date:nowTs()});
  } else {
    if (!selMus.size || !selInt) return;
    const sm = {light:1,moderate:2,maximum:3};
    selMus.forEach(m => logs.push({id:Date.now().toString()+m,type:'strength',muscles:[m],intensity:selInt,score:sm[selInt],date:nowTs()}));
  }
  saveLogs(logs);
  selMus.clear(); selInt = null;
  document.querySelectorAll('#strength-options .btn').forEach(b => b.className='btn');
  render();
}
function deleteLog(id) { saveLogs(getLogs().filter(l=>l.id!==id)); render(); }

function getDayPro(key) { return getProLogs().filter(l=>l.date===key).reduce((s,l)=>s+l.grams,0); }
function addProtein() {
  const g = parseInt(document.getElementById('inp-protein').value);
  const note = document.getElementById('inp-protein-note').value.trim();
  if (isNaN(g)||g<=0) return;
  const logs = getProLogs();
  logs.push({id:Date.now().toString(),date:todayKey(),timestamp:nowTs(),grams:g,note});
  saveProLogs(logs);
  document.getElementById('inp-protein').value='';
  document.getElementById('inp-protein-note').value='';
  renderProtein();
}
function deleteProtein(id) { saveProLogs(getProLogs().filter(l=>l.id!==id)); renderProtein(); }

function renderProtein() {
  const today = todayKey();
  const val = getDayPro(today);
  const pct = Math.min(100, Math.round(val/100*100));
  document.getElementById('protein-today-val').textContent = val;
  const bar = document.getElementById('protein-bar');
  bar.style.width = pct+'%';
  bar.className = 'pbar'+(val>=100?' over':'');

  const meals = getProLogs().filter(l=>l.date===today).reverse();
  document.getElementById('protein-meals').innerHTML = !meals.length
    ? '<p class="empty" style="margin-top:4px;">今天還沒有記錄</p>'
    : meals.map(l => {
        const d = new Date(l.timestamp||l.date);
        const ts = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} 週${DN[d.getDay()]} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        return `<div class="hist-item"><div class="hist-left"><span class="hist-name">${l.grams}g</span>${l.note?`<span class="hist-meta">${l.note}</span>`:''}<span class="hist-meta">${ts}</span></div><button class="del-btn" onclick="deleteProtein('${l.id}')">✕</button></div>`;
      }).join('');

  const now = new Date();
  const off = now.getDay()===0 ? -6 : 1-now.getDay();
  const days = Array.from({length:7},(_,i)=>{ const d=new Date(now); d.setDate(now.getDate()+off+i); return d; });
  const maxV = Math.max(100,...days.map(d=>getDayPro(d.toISOString().split('T')[0])));
  document.getElementById('protein-week-grid').innerHTML = days.map(d => {
    const key = d.toISOString().split('T')[0];
    const v = getDayPro(key);
    const h = Math.round(v/maxV*100);
    const isT = key===today, isFut = key>today;
    const bc = v>=100?'#378add':v>=70?'#1d9e75':v>0?'#ef9f27':'#ddd';
    return `<div class="day-col"><div class="day-bar-wrap" style="opacity:${isFut?'0.25':'1'}"><div class="day-bar" style="height:${h}%;background:${bc}"></div></div><div class="day-date" style="font-weight:${isT?500:400};color:${isT?'#1a1a1a':'#aaa'}">${d.getMonth()+1}/${d.getDate()}</div><div class="day-name" style="color:${isT?'#555':'#ccc'}">${DN[d.getDay()]}</div><div class="day-val">${v>0?v+'g':'-'}</div></div>`;
  }).join('');
}

function render() { renderMuscles(); renderTomorrow(); renderHistory(); renderProtein(); }
document.getElementById('today-label').textContent = new Date().toLocaleDateString('zh-TW',{weekday:'long',month:'long',day:'numeric'});
render();
setInterval(render, 60000);
</script>
</body>
</html>
